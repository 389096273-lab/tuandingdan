        function initCascade(prefix) {
            const provinceSelect = document.getElementById(prefix + 'Province');
            const citySelect = document.getElementById(prefix + 'City');
            const districtSelect = document.getElementById(prefix + 'District');

            for (const province in regionData) {
                const option = document.createElement('option');
                option.value = province;
                option.textContent = province;
                provinceSelect.appendChild(option);
            }

            provinceSelect.addEventListener('change', function() {
                const province = this.value;
                citySelect.innerHTML = '<option value="">请选择城市</option>';
                districtSelect.innerHTML = '<option value="">请选择区县</option>';
                if (province && regionData[province]) {
                    for (const city in regionData[province]) {
                        const option = document.createElement('option');
                        option.value = city;
                        option.textContent = city;
                        citySelect.appendChild(option);
                    }
                }
            });

            citySelect.addEventListener('change', function() {
                const province = provinceSelect.value;
                const city = this.value;
                districtSelect.innerHTML = '<option value="">请选择区县</option>';
                if (province && city && regionData[province][city]) {
                    regionData[province][city].forEach(function(district) {
                        const option = document.createElement('option');
                        option.value = district;
                        option.textContent = district;
                        districtSelect.appendChild(option);
                    });
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initCascade('send');
            initCascade('receive');
        });
    </script>
